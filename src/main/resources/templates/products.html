<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #fafaf9;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --accent: #1c1917;
      --accent-fg: #ffffff;
      --danger-bg: #fef2f2;
      --danger-text: #b91c1c;
      --danger-border: rgba(185,28,28,0.3);
      --success-text: #15803d;
      --info-bg: #eff6ff;
      --info-text: #1d4ed8;
      --radius: 8px;
      --radius-lg: 12px;
      --font: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Fira Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1917;
        --bg-secondary: #292524;
        --bg-tertiary: #211f1e;
        --text: #fafaf9;
        --text-muted: #a8a29e;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.22);
        --accent: #fafaf9;
        --accent-fg: #1c1917;
        --danger-bg: #3b0000;
        --danger-text: #fca5a5;
        --danger-border: rgba(252,165,165,0.25);
        --success-text: #4ade80;
        --info-bg: #1e3a5f;
        --info-text: #93c5fd;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header .badge {
      font-size: 11px;
      background: var(--info-bg);
      color: var(--info-text);
      border-radius: 20px;
      padding: 2px 10px;
      font-family: var(--font-mono);
    }

    main {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .url-input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--border-hover); }
    .url-input::placeholder { color: var(--text-muted); }

    button {
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
    }
    button:hover { background: var(--bg-secondary); border-color: var(--border-hover); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
      font-weight: 500;
    }
    .btn-primary:hover { opacity: 0.85; background: var(--accent); }

    .status-bar {
      padding: 0.6rem 1.25rem;
      font-size: 13px;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .status-bar.success { color: var(--success-text); }
    .status-bar.error { color: var(--danger-text); background: var(--danger-bg); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    th.col-id    { width: 90px; }
    th.col-price { width: 120px; }
    th.col-act   { width: 130px; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-secondary); }

    tbody td {
      padding: 11px 1.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td.id-cell { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    td.price-cell { font-variant-numeric: tabular-nums; font-weight: 500; }

    .row-actions { display: flex; gap: 6px; }

    .btn-xs {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
    }
    .btn-xs.danger:hover { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state p:first-child { font-size: 32px; margin-bottom: 0.5rem; }

    .card-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      justify-content: center;
      background: var(--bg-secondary);
    }

    .hateoas-bar {
      padding: 0.5rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      background: var(--bg-tertiary);
    }
    .hateoas-label { font-size: 11px; color: var(--text-muted); margin-right: 2px; }
    .rel-tag {
      font-size: 11px;
      font-family: var(--font-mono);
      background: var(--info-bg);
      color: var(--info-text);
      border-radius: 20px;
      padding: 1px 8px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 360px;
      max-width: 95vw;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--border-hover); }

    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');
  </style>
</head>
<body>

<header>
  <h1>Products Manager</h1>
  <span class="badge" id="headerBadge">HATEOAS</span>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <input class="url-input" type="text" id="baseUrl" value="http://localhost:8080" placeholder="http://your-api-host" />
      <button onclick="loadProducts()">Load</button>
      <button class="btn-primary" onclick="openCreate()">+ New</button>
    </div>

    <div class="status-bar info" id="status">Enter your API base URL and click Load.</div>

    <div id="tableArea">
      <div class="empty-state">
        <p>⬆</p>
        <p>Configure the base URL above and click Load to get started.</p>
      </div>
    </div>

    <div class="card-footer" id="pagination" style="display:none"></div>
    <div class="hateoas-bar" id="hateoasBar" style="display:none"></div>
  </div>
</main>

<div id="modalContainer"></div>

<script>
  const S = { products: [], pageLinks: {}, currentUrl: null };

  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const base = () => document.getElementById('baseUrl').value.replace(/\/$/, '');

  function setStatus(msg, type = 'info') {
    const el = document.getElementById('status');
    el.className = 'status-bar ' + type;
    el.innerHTML = msg;
  }

  function spin(msg) {
    setStatus(`<span class="spinner"></span>&nbsp;${esc(msg)}`);
  }

  async function apiFetch(url, method = 'GET', body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
    };
    if (body !== null) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) {
      const t = await res.text().catch(() => '');
      throw new Error(`${res.status} ${res.statusText}${t ? ': ' + t : ''}`);
    }
    if (res.status === 204) return null;
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('json')) return null;
    return res.json();
  }

  function extractLinks(obj) {
    const links = {};
    if (!obj) return links;
    const raw = obj._links || obj.links || {};
    for (const [rel, val] of Object.entries(raw)) {
      links[rel] = typeof val === 'string' ? val : (val?.href || val?.url || '');
    }
    return links;
  }

  function extractList(data) {
    if (Array.isArray(data)) return data;
    if (data?._embedded) {
      const vals = Object.values(data._embedded);
      if (vals.length) return [].concat(...vals);
    }
    if (Array.isArray(data?.content)) return data.content;
    if (Array.isArray(data?.items)) return data.items;
    if (Array.isArray(data?.data)) return data.data;
    return [];
  }

  async function loadProducts(url) {
    const target = url || (base() + '/products');
    S.currentUrl = target;
    spin('Loading products…');
    try {
      const data = await apiFetch(target);
      S.products = extractList(data);
      S.pageLinks = extractLinks(data);
      renderTable();
      renderPagination();
      renderHateoasBar(S.pageLinks);
      document.getElementById('headerBadge').textContent = S.products.length + ' items';
      setStatus(`${S.products.length} product(s) loaded.`, 'success');
    } catch (e) {
      setStatus('Failed to load: ' + e.message, 'error');
      document.getElementById('tableArea').innerHTML = `<div class="empty-state"><p>⚠</p><p>${esc(e.message)}</p></div>`;
      document.getElementById('pagination').style.display = 'none';
      document.getElementById('hateoasBar').style.display = 'none';
    }
  }

  function fmtPrice(v) {
    const n = parseFloat(v);
    return isNaN(n) ? esc(String(v ?? '')) : n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderTable() {
    const area = document.getElementById('tableArea');
    if (!S.products.length) {
      area.innerHTML = `<div class="empty-state"><p>📦</p><p>No products found.</p></div>`;
      return;
    }
    let rows = '';
    S.products.forEach((p, i) => {
      rows += `<tr>
        <td class="id-cell">${esc(p.id ?? '')}</td>
        <td>${esc(p.name ?? '')}</td>
        <td class="price-cell">${fmtPrice(p.price)}</td>
        <td>
          <div class="row-actions">
            <button class="btn-xs" onclick="openEdit(${i})">Edit</button>
            <button class="btn-xs danger" onclick="deleteProduct(${i})">Delete</button>
          </div>
        </td>
      </tr>`;
    });
    area.innerHTML = `<table>
      <thead><tr>
        <th class="col-id">ID</th>
        <th>Name</th>
        <th class="col-price">Price</th>
        <th class="col-act">Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    const L = S.pageLinks;
    const btns = [];
    if (L.first)    btns.push(`<button onclick="loadProducts('${esc(L.first)}')">« first</button>`);
    if (L.prev || L.previous) btns.push(`<button onclick="loadProducts('${esc(L.prev || L.previous)}')">‹ prev</button>`);
    if (L.next)     btns.push(`<button onclick="loadProducts('${esc(L.next)}')">next ›</button>`);
    if (L.last)     btns.push(`<button onclick="loadProducts('${esc(L.last)}')">last »</button>`);
    el.innerHTML = btns.join('');
    el.style.display = btns.length ? 'flex' : 'none';
  }

  function renderHateoasBar(links) {
    const bar = document.getElementById('hateoasBar');
    const rels = Object.keys(links);
    if (!rels.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML = `<span class="hateoas-label">Links:</span>` +
      rels.map(r => `<span class="rel-tag">${esc(r)}</span>`).join('');
  }

  function openCreate() {
    showModal('New product', { name: '', price: '' }, async (vals) => {
      await apiFetch(base() + '/products', 'POST', {
        name: vals.name,
        price: parseFloat(vals.price) || 0
      });
      setStatus('Product created.', 'success');
      loadProducts(S.currentUrl);
    });
  }

  function openEdit(i) {
    const p = S.products[i];
    const links = extractLinks(p);
    const url = links.self || links.update || links.edit;
    if (!url) { setStatus('No self/update link on this item — cannot edit.', 'error'); return; }
    showModal('Edit product', { name: p.name ?? '', price: p.price ?? '' }, async (vals) => {
      await apiFetch(url, 'PUT', {
        name: vals.name,
        price: parseFloat(vals.price) || 0
      });
      setStatus('Product updated.', 'success');
      loadProducts(S.currentUrl);
    });
  }

  async function deleteProduct(i) {
    const p = S.products[i];
    const links = extractLinks(p);
    const url = links.self || links.delete;
    if (!url) { setStatus('No self/delete link on this item.', 'error'); return; }
    if (!confirm(`Delete "${p.name}"?`)) return;
    spin('Deleting…');
    try {
      await apiFetch(url, 'DELETE');
      setStatus('Deleted.', 'success');
      loadProducts(S.currentUrl);
    } catch (e) {
      setStatus('Delete failed: ' + e.message, 'error');
    }
  }

  function showModal(title, initial, onSave) {
    const bg = document.createElement('div');
    bg.className = 'modal-overlay';
    bg.id = 'modalBg';
    bg.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
      <h2>${esc(title)}</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="mf_name" value="${esc(String(initial.name))}" placeholder="Product name" autocomplete="off" />
      </div>
      <div class="field">
        <label>Price</label>
        <input type="number" id="mf_price" value="${esc(String(initial.price))}" placeholder="0.00" step="0.01" min="0" />
      </div>
      <div class="modal-footer">
        <button onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="saveBtn" onclick="doSave()">Save</button>
      </div>
    </div>`;
    bg.addEventListener('click', e => { if (e.target === bg) closeModal(); });
    document.getElementById('modalContainer').appendChild(bg);
    document.getElementById('mf_name').focus();

    window._doSave = async () => {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      try {
        await onSave({
          name: document.getElementById('mf_name').value,
          price: document.getElementById('mf_price').value
        });
        closeModal();
      } catch (e) {
        setStatus('Save failed: ' + e.message, 'error');
        btn.disabled = false;
      }
    };
  }

  function doSave() { window._doSave && window._doSave(); }
  function closeModal() { document.getElementById('modalBg')?.remove(); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modalBg')) doSave();
  });
</script>

</body>
</html>
